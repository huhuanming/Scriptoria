name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Swift Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Run full test suite
        run: swift test

      - name: Run run+agent E2E test only
        run: swift test --filter ScriptoriaCoreTests.ScriptoriaCLITests/testRunCommandAgentStage
